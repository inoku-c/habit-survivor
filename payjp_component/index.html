<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAY.JP Checkout</title>
  <script src="https://js.pay.jp/v2/pay.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; }

    #checkout-container {
      padding: 1rem;
      max-width: 400px;
    }

    .field-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.4rem;
    }

    .payjp-field-wrapper {
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
      margin-bottom: 0.8rem;
      transition: border-color 0.2s;
    }

    .payjp-field-wrapper.focused {
      border-color: #38ef7d;
      box-shadow: 0 0 0 3px rgba(56, 239, 125, 0.15);
    }

    .payjp-field-wrapper.invalid {
      border-color: #e53e3e;
    }

    #card-number-element,
    #card-expiry-element,
    #card-cvc-element {
      height: 24px;
    }

    .row-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    #pay-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
    }

    #pay-button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    #pay-button:active:not(:disabled) { transform: translateY(0); }
    #pay-button:disabled { opacity: 0.6; cursor: not-allowed; }

    #error-message {
      color: #e53e3e;
      font-size: 0.85rem;
      margin-top: 0.6rem;
      min-height: 1.2em;
    }

    #success-message {
      color: #38a169;
      font-size: 0.9rem;
      margin-top: 0.6rem;
      text-align: center;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="checkout-container">
    <div>
      <label class="field-label">カード番号</label>
      <div class="payjp-field-wrapper" id="card-number-wrapper">
        <div id="card-number-element"></div>
      </div>
    </div>
    <div class="row-2col">
      <div>
        <label class="field-label">有効期限</label>
        <div class="payjp-field-wrapper" id="card-expiry-wrapper">
          <div id="card-expiry-element"></div>
        </div>
      </div>
      <div>
        <label class="field-label">セキュリティコード</label>
        <div class="payjp-field-wrapper" id="card-cvc-wrapper">
          <div id="card-cvc-element"></div>
        </div>
      </div>
    </div>
    <button id="pay-button" disabled>💳 クレジットカードで支払う（¥100/月）</button>
    <div id="error-message"></div>
    <div id="success-message"></div>
  </div>

  <script>
    // ── Streamlit Component 通信プロトコル ──────────────────────────────────
    function sendValueToStreamlit(value) {
      // postMessage でホスト(Streamlit)に値を送信
      window.parent.postMessage({ type: "streamlit:setComponentValue", value: value }, "*");
    }

    function setFrameHeight(height) {
      window.parent.postMessage({ type: "streamlit:setFrameHeight", height: height }, "*");
    }

    // ── コンポーネント初期化 ─────────────────────────────────────────────────
    window.addEventListener("message", function (event) {
      if (event.data.type === "streamlit:render") {
        var publicKey = (event.data.args && event.data.args.public_key) || "";
        initPayjp(publicKey);
      }
    });

    // Streamlit に準備完了を通知（初回レンダリングをトリガー）
    window.parent.postMessage({ type: "streamlit:componentReady", apiVersion: 1 }, "*");

    // ── PAY.JP Elements 初期化 ───────────────────────────────────────────────
    var payjpInstance = null;
    var cardNumber = null;
    var cardExpiry = null;
    var cardCvc = null;
    var initialized = false;
    var processedToken = null;  // 二重請求防止

    function initPayjp(publicKey) {
      if (initialized || !publicKey) return;
      initialized = true;

      payjpInstance = Payjp(publicKey);
      var elements = payjpInstance.elements();

      var elementStyle = {
        base: {
          color: "#2d3748",
          fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
          fontSize: "15px",
          "::placeholder": { color: "#a0aec0" }
        },
        invalid: { color: "#e53e3e" }
      };

      cardNumber = elements.create("cardNumber", { style: elementStyle });
      cardExpiry = elements.create("cardExpiry", { style: elementStyle });
      cardCvc    = elements.create("cardCvc",    { style: elementStyle });

      cardNumber.mount("#card-number-element");
      cardExpiry.mount("#card-expiry-element");
      cardCvc.mount("#card-cvc-element");

      // フォーカス状態のスタイル
      [
        { el: cardNumber, wrapperId: "card-number-wrapper" },
        { el: cardExpiry, wrapperId: "card-expiry-wrapper" },
        { el: cardCvc,    wrapperId: "card-cvc-wrapper"    }
      ].forEach(function(item) {
        item.el.on("focus", function() {
          document.getElementById(item.wrapperId).classList.add("focused");
        });
        item.el.on("blur", function() {
          document.getElementById(item.wrapperId).classList.remove("focused");
        });
        item.el.on("change", function(event) {
          var wrapper = document.getElementById(item.wrapperId);
          if (event.error) {
            wrapper.classList.add("invalid");
            showError(event.error.message);
          } else {
            wrapper.classList.remove("invalid");
            clearError();
          }
          updateButtonState();
        });
      });

      document.getElementById("pay-button").disabled = false;

      // フレーム高さをコンテンツに合わせる
      setTimeout(function() {
        setFrameHeight(document.getElementById("checkout-container").offsetHeight + 20);
      }, 300);
    }

    // ── カード完了チェック ───────────────────────────────────────────────────
    var cardComplete = { number: false, expiry: false, cvc: false };

    function updateButtonState() {
      // 全フィールド完了時のみ有効化（簡易チェック：エラー無し＆一定文字数）
      // PAY.JP Elements は change イベントで complete フラグを返す
    }

    // ── 支払いボタン ─────────────────────────────────────────────────────────
    document.getElementById("pay-button").addEventListener("click", async function() {
      if (!payjpInstance || !cardNumber) return;

      var button = document.getElementById("pay-button");
      button.disabled = true;
      button.textContent = "処理中...";
      clearError();

      try {
        var result = await payjpInstance.createToken(cardNumber);

        if (result.error) {
          showError(result.error.message || "カード情報の処理に失敗しました。");
          button.disabled = false;
          button.textContent = "💳 クレジットカードで支払う（¥100/月）";
          return;
        }

        var tokenId = result.id;

        // 二重請求防止：同じトークンを2回送らない
        if (processedToken === tokenId) {
          showError("このトークンは既に処理済みです。");
          return;
        }
        processedToken = tokenId;

        // sessionStorage に一時保存（バックアップ）
        try {
          sessionStorage.setItem("payjp_token_pending", tokenId);
        } catch(e) {}

        // Streamlit Python 側へ送信
        sendValueToStreamlit(tokenId);

        document.getElementById("success-message").textContent =
          "✅ カード情報を送信しました。処理中...";
        button.textContent = "処理完了";

      } catch (err) {
        showError("予期しないエラーが発生しました: " + (err.message || err));
        button.disabled = false;
        button.textContent = "💳 クレジットカードで支払う（¥100/月）";
      }
    });

    function showError(msg) {
      document.getElementById("error-message").textContent = msg || "";
    }
    function clearError() {
      document.getElementById("error-message").textContent = "";
    }
  </script>
</body>
</html>
